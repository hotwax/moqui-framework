# for options see https://docs.gradle.org/5.6.4/userguide/build_environment.html#sec:gradle_configuration_properties
org.gradle.warning.mode=none
# Java 11 required — HotWax Moqui's Bitronix TX manager fails on Java 17.
# Pinned via jenv: the .java-version file (= 11) makes the jenv shim resolve
# `java` to a Java 11 JDK for this directory, which gradlew and the daemon inherit.
# Fallback for machines without jenv: uncomment and point at a local Java 11 home.
#org.gradle.java.home=/opt/homebrew/opt/openjdk@11/libexec/openjdk.jdk/Contents/Home
